services:
  db:
    image: postgres:16.6-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: callboard
      POSTGRES_PASSWORD: callboard_dev
      POSTGRES_DB: callboard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callboard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
