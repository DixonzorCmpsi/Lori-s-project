name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: callboard
          POSTGRES_PASSWORD: callboard_test
          POSTGRES_DB: callboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://callboard:callboard_test@localhost:5432/callboard_test
          NODE_ENV: test

      - name: Run build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t digital-call-board .

      - name: Verify container starts
        run: |
          docker run -d --name test-container \
            -e DATABASE_URL=postgresql://test:test@localhost:5432/test \
            -e SESSION_SECRET=test-secret \
            digital-call-board
          sleep 5
          docker logs test-container
          docker stop test-container
